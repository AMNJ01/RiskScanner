services:
  # The Python Backend Service
  - type: web
    name: riskscanner-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --pythonpath backend app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # The Static Frontend Service
  - type: static
    name: riskscanner-frontend
    runtime: static
    buildCommand: "" 
    publishPath: ./Frontend
